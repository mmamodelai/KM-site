const ITER = 200000;

async function decrypt() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64dec(SALT), iterations:ITER, hash:'SHA-256' },
      keyMaterial, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64dec(IV) }, key, b64dec(CT));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch(e) {
    const err = document.getElementById('err');
    err.style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function b64dec(s) {
  const bin = atob(s);
  const buf = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') decrypt(); });

async function decrypt(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
function b64(s){const bin=atob(s);const buf=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);return buf;}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')decrypt();});
